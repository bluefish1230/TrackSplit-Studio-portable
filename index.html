<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TrackSplit Studio | TXT / LRC 轉繁體</title>
  <meta name="description" content="直接在網頁上把 TXT / LRC 簡體字轉成繁體字，並可下載結果。">
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111b;
      --panel: rgba(12, 23, 34, 0.92);
      --line: #244054;
      --text: #ecf7ff;
      --muted: #9ab0bf;
      --cyan: #57d8ff;
      --green: #72e2a3;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.32);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Microsoft JhengHei", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(87, 216, 255, 0.18), transparent 32%),
        radial-gradient(circle at 80% 10%, rgba(114, 226, 163, 0.12), transparent 28%),
        linear-gradient(180deg, #06101a 0%, var(--bg) 100%);
    }

    button, input, textarea { font: inherit; }
    .shell {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 56px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      margin-bottom: 22px;
    }

    .brand strong {
      display: block;
      font-size: 24px;
      letter-spacing: 0.4px;
    }

    .brand strong span { color: var(--cyan); }
    .brand small { color: var(--muted); }

    .pill {
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(10, 20, 30, 0.72);
      color: var(--muted);
      font-size: 14px;
    }

    .hero, .card {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .hero {
      padding: 28px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 48px);
      line-height: 1.08;
    }

    .hero p,
    .card p,
    footer {
      color: var(--muted);
      line-height: 1.8;
    }

    .card {
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    h2 {
      margin: 0;
      font-size: 21px;
    }

    .drop {
      padding: 24px 18px;
      border: 1px dashed #40657f;
      border-radius: 16px;
      text-align: center;
      background: rgba(7, 16, 25, 0.42);
      cursor: pointer;
      transition: 0.2s ease;
    }

    .drop:hover,
    .drop.drag {
      border-color: var(--cyan);
      background: rgba(87, 216, 255, 0.08);
      transform: translateY(-1px);
    }

    .drop strong {
      display: block;
      font-size: 18px;
      margin-bottom: 6px;
    }

    .drop span {
      color: var(--muted);
      font-size: 14px;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 11px;
      padding: 11px 15px;
      cursor: pointer;
      font-weight: 700;
    }

    .btn.primary {
      color: #021018;
      background: linear-gradient(135deg, var(--cyan), var(--green));
    }

    .btn.secondary {
      color: var(--text);
      background: #192b3a;
      border: 1px solid #315069;
    }

    .btn.ghost {
      color: var(--text);
      background: rgba(18, 30, 42, 0.82);
      border: 1px solid var(--line);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .message {
      min-height: 22px;
      color: var(--muted);
      font-size: 14px;
    }

    .upload-list {
      display: grid;
      gap: 12px;
    }

    .file-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(9, 17, 26, 0.9);
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .file-item h3 {
      margin: 0;
      font-size: 16px;
      word-break: break-all;
    }

    .info {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      word-break: break-all;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      border: 1px solid #2d4559;
      border-radius: 12px;
      padding: 12px;
      color: var(--text);
      background: #071019;
      line-height: 1.7;
    }

    .empty {
      color: var(--muted);
      padding: 18px 0;
    }

    footer {
      margin-top: 18px;
      text-align: center;
      font-size: 12px;
    }

    @media (max-width: 820px) {
      header { flex-direction: column; align-items: flex-start; }
      .hero { padding: 22px; }
    }
  </style>
  <script src="assets/opencc-cn2t.js"></script>
</head>
<body>
  <main class="shell">
    <header>
      <div class="brand">
        <strong>TrackSplit <span>Studio</span></strong>
        <small>TXT / LRC 轉繁體</small>
      </div>
      <div class="pill" id="environmentPill">線上版</div>
    </header>

    <section class="hero">
      <h1>直接在網頁上把 TXT 和 LRC 轉成繁體中文</h1>
      <p>
        上傳 `.txt` 或 `.lrc` 檔後，頁面會在瀏覽器內直接轉成繁體中文，並保留原本換行格式。
        轉換完成後可以直接下載。
      </p>
    </section>

    <section class="card">
      <h2>TXT / LRC 轉繁體</h2>
      <p>支援多檔拖放或手動選檔，輸出同副檔名的繁體版本。</p>
      <div class="drop" id="textDropZone">
        <strong>拖曳 TXT / LRC 檔到這裡</strong>
        <span>或點擊選擇檔案，支援多選</span>
        <input id="textInput" type="file" accept=".txt,.lrc,text/plain,.txt,.lrc" multiple hidden>
      </div>
      <div class="btn-row">
        <button class="btn primary" id="pickTextBtn">選擇 TXT / LRC</button>
        <button class="btn ghost" id="clearTextBtn" disabled>清除結果</button>
      </div>
      <div class="message" id="textStatus">等待上傳檔案。</div>
      <div class="upload-list" id="textResults"></div>
    </section>

    <footer>
      這個頁面可直接在瀏覽器中轉換 TXT / LRC。
    </footer>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const textInput = $('textInput');
    const textDropZone = $('textDropZone');
    const pickTextBtn = $('pickTextBtn');
    const clearTextBtn = $('clearTextBtn');
    const textResults = $('textResults');
    const textStatus = $('textStatus');

    let converterPromise = null;

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = src;
        script.onload = () => resolve();
        script.onerror = () => reject(new Error(`無法載入 ${src}`));
        document.head.appendChild(script);
      });
    }

    async function getConverter() {
      if (!converterPromise) {
        converterPromise = (async () => {
          await loadScript('assets/opencc-cn2t.js');
          if (!window.OpenCC) throw new Error('OpenCC.js 載入失敗');
          return OpenCC.Converter({ from: 'cn', to: 'tw' });
        })();
      }
      return converterPromise;
    }

    function sizeText(bytes) {
      const units = ['B', 'KB', 'MB', 'GB'];
      let value = bytes;
      let index = 0;
      while (value >= 1024 && index < units.length - 1) {
        value /= 1024;
        index++;
      }
      return `${value.toFixed(index && value < 10 ? 1 : 0)} ${units[index]}`;
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
      }[char]));
    }

    function downloadTextFile(filename, text) {
      const blob = new Blob(['\ufeff', text], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function renderTextItems(items) {
      if (!items.length) {
        textResults.innerHTML = '<div class="empty">尚未上傳檔案。</div>';
        clearTextBtn.disabled = true;
        return;
      }

      clearTextBtn.disabled = false;
      textResults.innerHTML = items.map((item, index) => `
        <section class="file-item">
          <h3>${escapeHtml(item.file.name)}</h3>
          <div class="info">
            原始大小：${escapeHtml(sizeText(item.file.size))}<br>
            轉換後大小：${escapeHtml(sizeText(new Blob([item.converted]).size))}<br>
            字數：${escapeHtml(String(item.original.length))} → ${escapeHtml(String(item.converted.length))}
          </div>
          <textarea readonly>${escapeHtml(item.converted)}</textarea>
          <div class="btn-row">
            <button class="btn primary" data-action="download" data-index="${index}">下載轉換後檔案</button>
            <button class="btn secondary" data-action="copy" data-index="${index}">複製內容</button>
          </div>
        </section>
      `).join('');
    }

    async function convertTextFiles(files) {
      const list = Array.from(files || []).filter((file) => /\.(txt|lrc)$/i.test(file.name));
      if (!list.length) {
        textStatus.textContent = '請選擇 TXT 或 LRC 檔。';
        return;
      }

      textStatus.textContent = `正在轉換 ${list.length} 個檔案…`;
      const converter = await getConverter();
      const items = [];

      for (let i = 0; i < list.length; i++) {
        const file = list[i];
        const original = await file.text();
        const normalized = original.replace(/^\uFEFF/, '').replace(/\r\n?/g, '\n');
        const converted = converter(normalized).replace(/\n/g, '\r\n');
        items.push({ file, original: normalized, converted });
        textStatus.textContent = `已完成 ${i + 1} / ${list.length}`;
      }

      window.__textItems = items;
      renderTextItems(items);
      textStatus.textContent = `已完成 ${items.length} 個檔案，點「下載轉換後檔案」即可保存。`;
    }

    textDropZone.addEventListener('click', () => textInput.click());
    pickTextBtn.addEventListener('click', () => textInput.click());
    textInput.addEventListener('change', () => convertTextFiles(textInput.files));

    clearTextBtn.addEventListener('click', () => {
      textInput.value = '';
      textResults.innerHTML = '<div class="empty">尚未上傳檔案。</div>';
      textStatus.textContent = '已清除結果。';
      clearTextBtn.disabled = true;
    });

    textResults.addEventListener('click', async (event) => {
      const button = event.target.closest('button[data-action]');
      if (!button) return;
      const index = Number(button.dataset.index);
      const item = window.__textItems?.[index];
      if (!item) return;

      if (button.dataset.action === 'download') {
        const outputName = item.file.name.replace(/\.(txt|lrc)$/i, '') + '_繁體' + (item.file.name.match(/\.[^.]+$/)?.[0] || '.txt');
        downloadTextFile(outputName, item.converted);
        return;
      }

      if (button.dataset.action === 'copy') {
        await navigator.clipboard.writeText(item.converted);
        button.textContent = '已複製';
        setTimeout(() => { button.textContent = '複製內容'; }, 1000);
      }
    });

    ['dragenter', 'dragover'].forEach((name) => {
      textDropZone.addEventListener(name, (event) => {
        event.preventDefault();
        textDropZone.classList.add('drag');
      });
    });

    ['dragleave', 'drop'].forEach((name) => {
      textDropZone.addEventListener(name, (event) => {
        event.preventDefault();
        textDropZone.classList.remove('drag');
        if (name === 'drop') convertTextFiles(event.dataTransfer.files);
      });
    });

    textStatus.textContent = '可以直接上傳 TXT / LRC 檔轉換。';
  </script>
</body>
</html>
